name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: miniping-linux-x86_64
          - target: aarch64-unknown-linux-musl
            artifact_name: miniping-linux-aarch64
          - target: x86_64-apple-darwin
            artifact_name: miniping-macos-x86_64
          - target: aarch64-apple-darwin
            artifact_name: miniping-macos-aarch64
          - target: x86_64-pc-windows-msvc
            artifact_name: miniping-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build production profile
        run: cargo build --profile production --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp target/${{ matrix.target }}/production/miniping.exe ${{ matrix.artifact_name }}.exe
          else
            cp target/${{ matrix.target }}/production/miniping ${{ matrix.artifact_name }}
          fi

      - name: Create tarball (Linux/macOS)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        shell: bash
        run: tar czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Create zip (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: powershell -Command "Compress-Archive -Path ${{ matrix.artifact_name }}.exe -DestinationPath ${{ matrix.artifact_name }}.zip"

      - name: Create checksums
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            sha256sum ${{ matrix.artifact_name }}.zip > checksums.txt
          else
            sha256sum ${{ matrix.artifact_name }}.tar.gz > checksums.txt
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
