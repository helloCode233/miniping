name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: miniping-linux-x86_64
            ext: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: miniping-linux-aarch64
            ext: tar.gz
            linker: aarch64-linux-gnu-gcc
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: miniping-macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: miniping-macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            artifact_name: miniping-windows-x86_64
            ext: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install cross compilation toolchain
        if: matrix.linker != ''
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build production profile
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.linker }}
        run: |
          if [ -n "$CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER="$CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER"
          fi
          cargo build --profile production --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp target/${{ matrix.target }}/production/miniping.exe ${{ matrix.artifact_name }}.exe
          else
            cp target/${{ matrix.target }}/production/miniping ${{ matrix.artifact_name }}
          fi

      - name: Create tarball (Linux/macOS)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: tar czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Create zip (Windows)
        if: matrix.ext == 'zip'
        shell: bash
        run: powershell -Command "Compress-Archive -Path ${{ matrix.artifact_name }}.exe -DestinationPath ${{ matrix.artifact_name }}.zip"

      - name: Create checksums
        shell: bash
        run: |
          if [ "${{ matrix.ext }}" = "zip" ]; then
            sha256sum ${{ matrix.artifact_name }}.zip > checksums.txt
          else
            sha256sum ${{ matrix.artifact_name }}.tar.gz > checksums.txt
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
