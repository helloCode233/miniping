name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build
        run: |
          rustup target add x86_64-unknown-linux-musl
          cargo build --release --profile production --target x86_64-unknown-linux-musl

      - name: Strip
        run: strip target/x86_64-unknown-linux-musl/release/miniping

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniping-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/miniping
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: miniping-linux-x86_64
          generate_release_notes: true