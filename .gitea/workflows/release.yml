name: Release

on:
  push:
    tags:
      - 'v*'
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    container: rust:alpine

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build
        run: |
          apk add --no-cache musl-tools
          cargo build --release --profile production --target x86_64-unknown-linux-musl

      - name: Strip
        run: strip target/x86_64-unknown-linux-musl/release/miniping

      - name: Upload artifact
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: miniping-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/miniping
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: https://github.com/actions/download-artifact@v4

      - name: Create Release
        run: |
          # Use Gitea's generic create release action or API
          echo "Artifact: miniping-linux-x86_64 ready for release"